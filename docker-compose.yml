version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: aivoa_postgres
    environment:
      POSTGRES_USER: aivoa_user
      POSTGRES_PASSWORD: aivoa_password
      POSTGRES_DB: aivoa
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aivoa_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aivoa_backend
    environment:
      DATABASE_URL: postgresql://aivoa_user:aivoa_password@postgres:5432/aivoa
      GROQ_API_KEY: ${GROQ_API_KEY}
      FASTAPI_ENV: production
      DEBUG: false
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: aivoa_frontend
    environment:
      VITE_API_BASE_URL: http://backend:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src

volumes:
  postgres_data:

networks:
  default:
    name: aivoa_network
